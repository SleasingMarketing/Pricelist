<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S LEASING — ตารางราคา</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:    #1B3070;
  --navy2:   #142558;
  --navy-lt: #e8ecf7;
  --navy-md: #c5cee8;
  --green:   #1D6F42;
  --green-lt:#e6f4ec;
  --red:     #C0273E;
  --red-lt:  #fbe9ec;
  --bg:      #f4f6fb;
  --surface: #ffffff;
  --surface2:#f0f3fa;
  --border:  #dde2f0;
  --border2: #c8d0e8;
  --text:    #1a2240;
  --text2:   #4a5580;
  --text3:   #8a97b8;
  --font-th: 'Sarabun', sans-serif;
  --font-cd: 'Barlow Condensed', sans-serif;
  --shadow:  0 1px 4px rgba(27,48,112,0.08);
  --shadow2: 0 4px 16px rgba(27,48,112,0.12);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family: var(--font-th);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
}
/* Desktop: fixed viewport layout */
@media (min-width: 768px) {
  body {
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
}

/* ══ TOPBAR ══ */
.topbar {
  background: var(--navy2);
  height: 4px;
  background: linear-gradient(90deg, var(--navy) 60%, var(--green) 60%, var(--green) 80%, var(--red) 80%);
}

/* ══ HEADER ══ */
.header {
  background: var(--surface);
  border-bottom: 2px solid var(--navy-lt);
  box-shadow: var(--shadow2);
  z-index: 200;
  flex-shrink: 0;
}

.header-top {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 24px 10px;
  border-bottom: 1px solid var(--border);
}

.logo-wrap {
  background: #fff;
  border-radius: 8px;
  padding: 4px 10px;
  border: 1px solid var(--border);
}
.logo-wrap img {
  height: 40px; width: auto;
  object-fit: contain;
  display: block;
}

.divider-v {
  width: 1px; height: 40px;
  background: var(--border2); flex-shrink: 0;
}

.page-title {
  display: flex; flex-direction: column; gap: 1px;
}
.page-title h1 {
  font-family: var(--font-cd);
  font-size: 22px; font-weight: 800;
  color: var(--navy); letter-spacing: 0.5px;
}
.page-title span {
  font-size: 12px; color: var(--text3); font-weight: 500;
}

.refresh-btn {
  margin-left: auto;
  background: var(--navy-lt);
  border: 1.5px solid var(--navy-md);
  color: var(--navy);
  font-family: var(--font-th);
  font-size: 12px; font-weight: 600;
  padding: 7px 14px; border-radius: 8px;
  cursor: pointer; transition: all 0.18s;
  display: flex; align-items: center; gap: 6px;
}
.refresh-btn:hover {
  background: var(--navy); color: #fff;
  border-color: var(--navy);
}

/* ══ FILTERS ══ */
.filter-bar {
  padding: 12px 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
}

.fg { display: flex; flex-direction: column; gap: 5px; }
.fg-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.9px; text-transform: uppercase;
  color: var(--text3);
}
.fg-pills { display: flex; flex-wrap: wrap; gap: 4px; }

.pill {
  padding: 5px 12px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 12.5px; font-weight: 500;
  color: var(--text2); cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
  font-family: var(--font-cd); letter-spacing: 0.3px;
}
.pill:hover { border-color: var(--navy); color: var(--navy); }
.pill.on {
  background: var(--navy); border-color: var(--navy);
  color: #fff; font-weight: 700;
}

/* ══ TOOLBAR ══ */
.toolbar {
  padding: 10px 24px;
  background: var(--navy-lt);
  border-bottom: 1px solid var(--navy-md);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  flex-shrink: 0;
}

.search-box {
  flex: 1; min-width: 200px; max-width: 340px;
  background: var(--surface);
  border: 1.5px solid var(--border2);
  border-radius: 8px; padding: 7px 12px;
  color: var(--text);
  font-family: var(--font-th); font-size: 13px;
  outline: none; transition: border-color 0.2s;
}
.search-box:focus { border-color: var(--navy); }
.search-box::placeholder { color: var(--text3); }

.result-badge {
  background: var(--navy);
  color: #fff;
  font-size: 12px; font-weight: 700;
  padding: 4px 12px; border-radius: 20px;
  font-family: var(--font-cd);
}

.chip-row {
  display: flex; flex-wrap: wrap; gap: 5px;
  margin-left: auto;
}
.chip {
  padding: 3px 9px;
  background: rgba(27,48,112,0.1);
  border: 1px solid rgba(27,48,112,0.2);
  border-radius: 20px;
  font-size: 11px; color: var(--navy);
  font-weight: 600;
}

/* ══ TABLE WRAPPER ══ */
.table-wrap {
  padding: 12px 14px 40px;
}
@media (min-width: 768px) {
  .table-wrap {
    padding: 16px 24px 40px;
    overflow: auto;
    flex: 1;
    min-height: 0;
  }
}

/* sticky container for frozen header */
.table-container {
  border-radius: 12px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

table {
  width: 100%; border-collapse: separate; border-spacing: 0;
  font-size: 13px;
}

/* FROZEN HEADER */
thead tr:first-child th {
  position: sticky; top: 0; z-index: 50;
}
thead tr:last-child th {
  position: sticky; top: 39px; z-index: 50;
}

thead tr:first-child th {
  background: var(--navy);
  color: rgba(255,255,255,0.75);
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
  padding: 10px 12px;
  text-align: center;
  border-bottom: none;
  white-space: nowrap;
  font-family: var(--font-cd);
}
thead tr:first-child th:first-child { text-align: left; padding-left: 16px; min-width: 200px; }
thead tr:first-child th.col-r { text-align: right; }

thead tr:last-child th {
  background: var(--navy2);
  color: rgba(255,255,255,0.6);
  font-size: 9px; font-weight: 600;
  letter-spacing: 0.7px; text-transform: uppercase;
  padding: 6px 12px;
  text-align: center;
  border-bottom: 2px solid var(--red);
  white-space: nowrap;
}
thead tr:last-child th:first-child { text-align: left; padding-left: 16px; }
thead tr:last-child th.col-r { text-align: right; }

/* GROUP ROWS */
.tr-group td {
  background: var(--navy-lt);
  color: var(--navy);
  font-size: 11px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 7px 16px;
  border-top: 2px solid var(--navy-md);
  font-family: var(--font-cd);
}

/* DATA ROWS */
tbody tr:not(.tr-group) {
  transition: background 0.1s;
}
tbody tr:not(.tr-group):hover td {
  background: var(--navy-lt) !important;
}
tbody tr:not(.tr-group):nth-child(even) td {
  background: #fafbfe;
}
tbody tr:not(.tr-group) td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  text-align: center;
  color: var(--text2);
  vertical-align: middle;
  white-space: nowrap;
  background: #fff;
}
tbody tr:not(.tr-group) td:first-child {
  text-align: left; padding-left: 16px;
}

/* CELL STYLES */
.model-name { font-size: 13px; font-weight: 600; color: var(--text); }
.model-sub  { font-size: 11px; color: var(--text3); margin-top: 1px; }

.price-val {
  font-family: var(--font-cd); font-size: 15px;
  font-weight: 700; color: var(--navy);
  letter-spacing: 0.3px;
}
.price-ins { font-size: 11px; color: var(--text3); margin-top: 1px; }

.down-val {
  font-family: var(--font-cd); font-size: 14px;
  font-weight: 600; color: var(--text2);
}

.fin-val {
  font-family: var(--font-cd); font-size: 14px;
  color: var(--text2);
}

.inst-val {
  font-family: var(--font-cd); font-size: 17px;
  font-weight: 800; color: var(--green);
  letter-spacing: 0.3px;
}

.total-val { font-family: var(--font-cd); font-size: 14px; color: var(--text2); }
.interest-val { font-size: 11px; color: var(--red); margin-top: 1px; }

.sep-l { border-left: 1px solid var(--border2) !important; }

.prod-filter-bar {
  padding: 10px 24px;
  background: var(--green-lt);
  border-bottom: 1px solid #b8ddc8;
  display: flex; gap: 16px; flex-wrap: wrap;
  flex-shrink: 0;
}
.prod-filter-bar .pill.on {
  background: var(--green); border-color: var(--green);
}
.prod-filter-bar .pill:hover { border-color: var(--green); color: var(--green); }

/* ══ STATES ══ */
.state-box {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 50vh; gap: 14px;
  color: var(--text3);
}
.state-icon { font-size: 48px; }
.state-title { font-size: 16px; font-weight: 600; color: var(--text2); }
.state-sub { font-size: 13px; text-align: center; max-width: 300px; line-height: 1.7; }

.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border2);
  border-top-color: var(--navy);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══ FOOTER ══ */
.footer {
  text-align: center; padding: 12px 20px;
  font-size: 11px; color: var(--text3);
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

/* ══ RESPONSIVE ══ */
@media (max-width: 767px) {
  .header-top { padding: 10px 14px; gap: 10px; }
  .logo-wrap img { height: 30px; }
  .logo-wrap { padding: 3px 8px; }
  .divider-v { display: none; }
  .page-title h1 { font-size: 17px; }
  .page-title span { font-size: 11px; }

  /* Filter toggle */
  .filter-bar {
    padding: 0;
    display: none;
    grid-template-columns: 1fr 1fr;
  }
  .filter-bar.open {
    display: grid;
    padding: 10px 14px;
  }
  .prod-filter-bar {
    padding: 8px 14px;
    gap: 10px;
  }
  .toolbar { padding: 8px 14px; flex-wrap: wrap; }
  .chip-row { display: none; }
  .table-wrap { padding: 8px 8px 50px; }
  .inst-val { font-size: 14px; }
  .price-val { font-size: 13px; }
  thead tr:first-child th { font-size: 9px; padding: 8px 6px; }
  thead tr:last-child th { font-size: 8px; padding: 5px 6px; top: 35px; }
  tbody td { padding: 8px 6px; font-size: 12px; }
  .model-name { font-size: 12px; }
  .model-sub { font-size: 10px; }

  /* Toggle btn */
  .filter-toggle-btn {
    display: flex !important;
  }
}
</style>
</head>

<script>
// Fix sticky table header top dynamically
function fixStickyHeader() {
  // On mobile, header is sticky, so table thead needs to account for all sticky elements
  // On desktop, table-wrap is scrollable, so top:0 within that container
  if (window.innerWidth < 768) {
    const header = document.querySelector('.header');
    const toolbar = document.querySelector('.toolbar');
    const prodBar = document.getElementById('prodFilterBar');
    let h1 = header ? header.offsetHeight : 0;
    let h2 = toolbar ? toolbar.offsetHeight : 0;
    let h3 = prodBar && prodBar.style.display !== 'none' ? prodBar.offsetHeight : 0;
    const top1 = h1 + h2 + h3;
    const top2 = top1 + 35;
    document.querySelectorAll('thead tr:first-child th').forEach(th => {
      th.style.top = top1 + 'px';
    });
    document.querySelectorAll('thead tr:last-child th').forEach(th => {
      th.style.top = top2 + 'px';
    });
  } else {
    document.querySelectorAll('thead tr:first-child th').forEach(th => th.style.top = '0px');
    document.querySelectorAll('thead tr:last-child th').forEach(th => th.style.top = '39px');
  }
}
window.addEventListener('resize', fixStickyHeader);

const URL_PRODUCT   = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTqK4anDk3ndNyyyY5M0zBzUhp9oGwZVdAvGFyzrMu-AXBR6wUkIqqcRR4WAqW5O3-0d90h3uiN_okO/pub?gid=0&single=true&output=csv';
const URL_CONDITION = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTqK4anDk3ndNyyyY5M0zBzUhp9oGwZVdAvGFyzrMu-AXBR6wUkIqqcRR4WAqW5O3-0d90h3uiN_okO/pub?gid=346594305&single=true&output=csv';

let products = [];
let conditions = {};
let sel = { term:'', rate:'', vat:'', ins:'', price:'', down:'' };
let selOS = ''; let selBrand = ''; let selModel = '';

function parseCSV(text) {
  // Full RFC-4180 parser: handles multiline quoted cells
  const rows = [];
  let row = [], cur = '', inQ = false, i = 0;
  while (i < text.length) {
    const c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i+1] === '"') { cur += '"'; i += 2; continue; } // escaped quote
        inQ = false; i++; continue;
      }
      cur += c; i++; continue;
    }
    if (c === '"') { inQ = true; i++; continue; }
    if (c === ',') { row.push(cur.trim()); cur = ''; i++; continue; }
    if (c === '\r' && text[i+1] === '\n') {
      row.push(cur.trim()); rows.push(row); row = []; cur = ''; i += 2; continue;
    }
    if (c === '\n') {
      row.push(cur.trim()); rows.push(row); row = []; cur = ''; i++; continue;
    }
    cur += c; i++;
  }
  if (cur || row.length) { row.push(cur.trim()); rows.push(row); }
  return rows;
}

function num(s) {
  return parseFloat(String(s||0).replace(/[,%฿\s]/g,'')) || 0;
}

async function loadAll() {
  const icon = document.getElementById('refreshIcon');
  icon.style.display = 'inline-block';
  icon.style.animation = 'spin 0.75s linear infinite';
  showLoading();
  try {
    const [rP, rC] = await Promise.all([
      fetch(URL_PRODUCT).then(r => { if(!r.ok) throw new Error('Product sheet error'); return r.text(); }),
      fetch(URL_CONDITION).then(r => { if(!r.ok) throw new Error('Condition sheet error'); return r.text(); })
    ]);
    parseProducts(rP);
    parseConditions(rC);
    buildFilters();
    buildProductFilters();
    render();
  } catch(e) {
    showError(e.message);
  }
  icon.style.animation = '';
}

function parseProducts(csv) {
  const rows = parseCSV(csv);
  products = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r[3] || !r[4]) continue;
    products.push({
      os:     (r[0]||'').trim(),
      brand:  (r[1]||'').trim(),
      model:  (r[2]||'').trim(),
      detail: (r[3]||'').trim(),
      price:  num(r[4]),
      priceR: num(r[5]),
      ins:    num(r[6])
    });
  }
}

function getUnique(key) {
  return [...new Set(products.map(p => p[key]).filter(Boolean))];
}

function parseConditions(csv) {
  const rows = parseCSV(csv);
  conditions = { term:[], rate:[], vat:[], ins:[], price:[], down:[] };
  const keys = ['term','rate','vat','ins','price','down'];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    keys.forEach((k, j) => {
      if (r[j] && !conditions[k].includes(r[j])) conditions[k].push(r[j]);
    });
  }
  // set defaults
  keys.forEach(k => { if (!sel[k] && conditions[k][0]) sel[k] = conditions[k][0]; });
}

function buildFilters() {
  const cfg = [
    { key:'term',  label:'จำนวนงวด'   },
    { key:'rate',  label:'ดอกเบี้ย'    },
    { key:'vat',   label:'ประเภทร้าน'  },
    { key:'ins',   label:'ประกัน'      },
    { key:'price', label:'ประเภทราคา'  },
    { key:'down',  label:'เงินดาวน์'   },
  ];
  let html = '';
  for (const {key, label} of cfg) {
    const vals = conditions[key] || [];
    if (!vals.length) continue;
    html += `<div class="fg">
      <div class="fg-label">${label}</div>
      <div class="fg-pills" id="pills-${key}">
        ${vals.map(v => `<div class="pill${sel[key]===v?' on':''}" data-key="${key}" data-val="${v}">${v}</div>`).join('')}
      </div>
    </div>`;
  }
  document.getElementById('filtersArea').innerHTML = html;
  document.getElementById('filtersArea').querySelectorAll('.pill').forEach(el => {
    el.addEventListener('click', function() {
      const k = this.dataset.key;
      sel[k] = this.dataset.val;
      document.querySelectorAll(`#pills-${k} .pill`).forEach(p => p.classList.remove('on'));
      this.classList.add('on');
      render();
    });
  });
}

// ══ FORMULAS ══
function calcInstallment(price, ins, downPct, term, rate, isVAT, withIns) {
  const down = price * downPct / 100;
  let inst;
  if (isVAT && !withIns) {
    inst = Math.ceil(((price - down) * (1 + rate * term)) / term);
  } else if (!isVAT && !withIns) {
    inst = Math.ceil(((price - down) * (1 + rate * term)) / term * 1.07);
  } else if (isVAT && withIns) {
    inst = Math.ceil(((((price - down) * 100 / 107) + ins) * (1 + rate * term)) / term * 1.07);
  } else {
    inst = Math.ceil((((price - down) + ins) * (1 + rate * term)) / term * 1.07);
  }
  const finAmt = (price - down) + (withIns ? ins : 0);
  return { down: Math.round(down), finAmt: Math.round(finAmt), inst };
}

function render() {
  const term    = parseFloat(sel.term) || 12;
  const rate    = parseFloat(sel.rate) / 100 || 0.05;
  const isVAT   = !(sel.vat && sel.vat.includes('No'));
  const withIns = sel.ins && sel.ins.includes('รวม') && !sel.ins.includes('ไม่');
  const useR    = sel.price && sel.price.toLowerCase().includes('rate');
  const downPct = parseFloat(sel.down) || 20;

  // chips
  const chips = [selOS||null, selBrand||null, selModel||null, sel.vat, sel.ins, sel.price, `ดาวน์ ${sel.down}`, `${sel.term} งวด`, `ดอกเบี้ย ${sel.rate}`].filter(Boolean);
  document.getElementById('chipRow').innerHTML = chips.map(c => `<div class="chip">${c}</div>`).join('');

  const q = (document.getElementById('searchBox').value || '').toLowerCase();
  const isAndroid = p => p.os.toLowerCase().includes('android');
  const isIOS = p => p.os.toLowerCase().includes('ios') || p.os.toLowerCase().includes('apple');
  const currentRate = parseFloat(sel.rate) || 3;

  const filtered = products.filter(p => {
    if (!p.detail && !p.model) return false;

    // Android: only show at 3%
    if (isAndroid(p) && currentRate !== 3) return false;

    // iOS at 3%: only show iPhone 17
    if (isIOS(p) && currentRate === 3) {
      const modelName = (p.model || '').toLowerCase();
      const detailName = (p.detail || '').toLowerCase();
      if (!modelName.includes('17') && !detailName.includes('17')) return false;
    }

    // OS filter
    if (selOS && p.os.toLowerCase().trim() !== selOS.toLowerCase().trim()) return false;
    // Brand filter
    if (selBrand && p.brand.toLowerCase().trim() !== selBrand.toLowerCase().trim()) return false;
    // Search
    if (q) return (p.detail||'').toLowerCase().includes(q) ||
                  (p.model||'').toLowerCase().includes(q) ||
                  (p.brand||'').toLowerCase().includes(q);
    return true;
  });

  const badge = document.getElementById('resultBadge');
  if (filtered.length) {
    badge.style.display = '';
    badge.textContent = `${filtered.length} รายการ`;
  } else {
    badge.style.display = 'none';
  }

  if (!filtered.length) { showEmpty(); return; }

  let rows = ''; let lastModel = '';
  for (const p of filtered) {
    if (p.model !== lastModel) {
      lastModel = p.model;
      rows += `<tr class="tr-group"><td colspan="6">${p.brand} · ${p.model}</td></tr>`;
    }
    const basePrice = useR && p.priceR ? p.priceR : p.price;
    if (!basePrice && !p.detail) continue;
    const { down, finAmt, inst } = calcInstallment(basePrice, p.ins, downPct, term, rate, isVAT, withIns);
    const total = inst * term;
    const cleanName = p.detail.replace(/^(APPLE|HONOR|INFINIX)\s+/i, '');
    const insTag = withIns ? `<div class="price-ins">+ประกัน ฿${fmt(p.ins)}</div>` : '';

    rows += `<tr>
      <td>
        <div class="model-name">${cleanName}</div>
        <div class="model-sub">${p.brand} · ${p.os}</div>
      </td>
      <td class="col-r"><div class="price-val">฿${fmt(basePrice)}</div>${insTag}</td>
      <td class="sep-l"><div class="down-val">฿${fmt(down)}</div></td>
      <td><div class="fin-val">฿${fmt(finAmt)}</div></td>
      <td class="sep-l"><div class="inst-val">฿${fmt(inst)}</div></td>
      <td>
        <div class="total-val">฿${fmt(total)}</div>
      </td>
    </tr>`;
  }

  fixStickyHeader();
  document.getElementById('tableWrap').innerHTML = `
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>รุ่น / รายละเอียด</th>
            <th class="col-r">ราคา${withIns?'+ประกัน':''}</th>
            <th class="sep-l">เงินดาวน์</th>
            <th>ยอดจัด</th>
            <th class="sep-l">ค่างวด / เดือน</th>
            <th>ยอดรวม</th>
          </tr>
          <tr>
            <th></th>
            <th class="col-r">${useR ? 'ราคา Rate' : 'ราคาปกติ'}</th>
            <th class="sep-l">${sel.down} ของราคา</th>
            <th>ราคา − ดาวน์${withIns?' + ประกัน':''}</th>
            <th class="sep-l">${sel.term} งวด · ดบ.${sel.rate}</th>
            <th>ค่างวด × ${sel.term} งวด</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function fmt(n) { return Math.round(n||0).toLocaleString('th-TH'); }

function showLoading() {
  document.getElementById('tableWrap').innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <div class="state-title">กำลังโหลดข้อมูล...</div>
      <div class="state-sub">ดึงข้อมูลจาก Google Sheets</div>
    </div>`;
}

function showEmpty() {
  document.getElementById('tableWrap').innerHTML = `
    <div class="state-box">
      <div class="state-icon">📋</div>
      <div class="state-title">ไม่พบรายการ</div>
      <div class="state-sub">ลองค้นหาด้วยคำอื่น หรือเปลี่ยนเงื่อนไขการกรอง</div>
    </div>`;
}

function showError(msg) {
  document.getElementById('tableWrap').innerHTML = `
    <div class="state-box">
      <div class="state-icon">⚠️</div>
      <div class="state-title">โหลดข้อมูลไม่สำเร็จ</div>
      <div class="state-sub">${msg}<br><br>กรุณาตรวจสอบว่า Google Sheets ตั้งค่า<br>"Publish to web" แล้ว</div>
    </div>`;
}

function buildProductFilters() {
  const bar = document.getElementById('prodFilterBar');
  bar.style.display = 'flex';

  function renderPills(id, vals, selVal, onChange) {
    const container = document.getElementById(id);
    container.innerHTML = `<div class="pill${!selVal?' on':''}" data-val="">ทั้งหมด</div>` +
      vals.map(v => `<div class="pill${selVal===v?' on':''}" data-val="${v}">${v}</div>`).join('');
    container.querySelectorAll('.pill').forEach(el => {
      el.addEventListener('click', function() {
        container.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
        this.classList.add('on');
        onChange(this.dataset.val);
      });
    });
  }

  const allOS = getUnique('os');
  renderPills('pills-os', allOS, selOS, val => {
    selOS = val; selBrand = ''; selModel = '';
    // Android: force 3% interest only
    if (selOS.toLowerCase().includes('android')) {
      sel.rate = '3%';
      document.querySelectorAll('#pills-rate .pill').forEach(p => {
        p.classList.toggle('on', p.dataset.val === '3%');
        p.style.opacity = p.dataset.val === '3%' ? '1' : '0.3';
        p.style.pointerEvents = p.dataset.val === '3%' ? '' : 'none';
      });
    } else {
      document.querySelectorAll('#pills-rate .pill').forEach(p => {
        p.style.opacity = '';
        p.style.pointerEvents = '';
      });
    }
    buildProductFilters(); render();
  });

  const filteredBrands = getUnique('brand').filter(b =>
    !selOS || products.some(p =>
      p.os.toLowerCase().trim() === selOS.toLowerCase().trim() && p.brand === b
    )
  );
  renderPills('pills-brand', filteredBrands, selBrand, val => {
    selBrand = val; selModel = '';
    buildProductFilters(); render();
  });

}

document.getElementById('searchBox').addEventListener('input', () => render());
function toggleFilters() {
  const bar = document.getElementById('filtersArea');
  const btn = document.getElementById('filterToggleBtn');
  bar.classList.toggle('open');
  btn.style.background = bar.classList.contains('open') ? 'var(--navy)' : 'var(--navy-lt)';
  btn.style.color = bar.classList.contains('open') ? '#fff' : 'var(--navy)';
}

loadAll();
</script>
